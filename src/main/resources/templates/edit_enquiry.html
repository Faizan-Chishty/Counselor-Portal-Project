<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Edit Enquiry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Edit Enquiry</span>
<a href="/view-enquiries" class="btn btn-light">Back</a>
</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-warning text-dark text-center">
<h4>Update Enquiry</h4>
</div>

<div class="card-body">

<form action="/update" method="post">

<input type="hidden" name="id" th:value="${student.id}">

<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" name="studentName" class="form-control"
th:value="${student.studentName}">
</div>

<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" name="phone" class="form-control"
th:value="${student.phone}">
</div>

<div class="mb-3">
<label class="form-label">Course</label>
<input type="text" name="course" class="form-control"
th:value="${student.course}">
</div>

<div class="mb-3">
<label class="form-label">City</label>
<input type="text" name="city" class="form-control"
th:value="${student.city}">
</div>

<div class="mb-3">
<label class="form-label">Status</label>

<select name="status" class="form-select">

<option value="OPEN">OPEN</option>
<option value="ENROLLED">ENROLLED</option>
<option value="LOST">LOST</option>

</select>

</div>

<button class="btn btn-warning w-100">Update Enquiry</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
