<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">Counselor Dashboard</span>

<a href="/logout" class="btn btn-danger">Logout</a>

</div>

</nav>

<div class="container mt-4">

<div class="row">

<div class="col-md-4">

<div class="card text-white bg-primary">

<div class="card-body">

<h5>Open</h5>
<h2 th:text="${open}"></h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-white bg-success">

<div class="card-body">

<h5>Enrolled</h5>
<h2 th:text="${enrolled}"></h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-white bg-danger">

<div class="card-body">

<h5>Lost</h5>
<h2 th:text="${lost}"></h2>

</div>

</div>

</div>

</div>

<br>

<a href="/add-enquiry" class="btn btn-primary">Add Enquiry</a>

<a href="/view-enquiries" class="btn btn-dark">View Enquiries</a>

</div>

</body>
</html>
