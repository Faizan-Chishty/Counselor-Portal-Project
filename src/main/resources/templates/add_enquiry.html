<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Add Enquiry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Add Student Enquiry</span>
<a href="/dashboard" class="btn btn-light">Dashboard</a>
</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white text-center">
<h4>New Enquiry</h4>
</div>

<div class="card-body">

<form action="/save-enquiry" method="post">

<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" name="studentName" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" name="phone" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Course</label>
<input type="text" name="course" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">City</label>
<input type="text" name="city" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Status</label>

<select name="status" class="form-select">

<option value="OPEN">OPEN</option>
<option value="ENROLLED">ENROLLED</option>
<option value="LOST">LOST</option>

</select>

</div>

<button class="btn btn-primary w-100">Save Enquiry</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
