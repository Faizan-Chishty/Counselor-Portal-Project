<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Enquiries</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h3>All Enquiries</h3>

<form action="/search" class="mb-3">

<input type="text" name="phone" placeholder="Search by phone">

<button class="btn btn-primary btn-sm">Search</button>

</form>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>Name</th>
<th>Phone</th>
<th>Course</th>
<th>City</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="s : ${list}">

<td th:text="${s.studentName}"></td>
<td th:text="${s.phone}"></td>
<td th:text="${s.course}"></td>
<td th:text="${s.city}"></td>
<td th:text="${s.status}"></td>

<td>

<a th:href="@{/edit(id=${s.id})}" class="btn btn-warning btn-sm">Edit</a>

<a th:href="@{/delete(id=${s.id})}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

</tbody>

</table>

<a href="/dashboard" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
